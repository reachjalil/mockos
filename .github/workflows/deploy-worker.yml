name: Deploy worker (M2 gate)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.11.1
  PNPM_VERSION: 10.30.2

jobs:
  deploy:
    name: Deploy and pre-M2 health probe
    if: >-
      vars.MOCKOS_WORKER_DEPLOY_ENABLED == 'true' &&
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: worker-production
      url: ${{ vars.MOCKOS_WORKER_URL }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_WORKER_URL }}
    steps:
      - name: Check explicit deployment opt-in
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$MOCKOS_SMOKE_ORIGIN"
          case "$MOCKOS_SMOKE_ORIGIN" in
            https://*) ;;
            *) printf 'MOCKOS_WORKER_URL must be an HTTPS origin.\n' >&2; exit 1 ;;
          esac
      - name: Check out the CI-validated revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify pre-zone Wrangler shape
        run: node scripts/check-worker-wrangler.mjs --allow-workers-dev
      - name: Verify Wrangler identity
        run: pnpm --filter @mockos/worker exec wrangler whoami
      - name: Deploy production Worker
        run: pnpm --filter @mockos/worker exec wrangler deploy --env=
      - name: Run the public health probe
        run: bash scripts/smoke-worker.sh
      - name: Record incomplete M2 acceptance
        run: >-
          printf '%s\n'
          'Deployment and public health passed. This workflow does not claim the M2
          authenticated MCP/OIDC/JWKS/scenario/delete smoke until that sequence replaces
          the health-only probe.'
