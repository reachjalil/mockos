name: Deploy worker (M3 gate)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.11.1
  PNPM_VERSION: 10.30.2

jobs:
  deploy:
    name: Deploy and run M3 acceptance smoke
    if: >-
      vars.MOCKOS_WORKER_DEPLOY_ENABLED == 'true' &&
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: worker-production
      url: ${{ vars.MOCKOS_WORKER_URL }}
    env:
      MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_WORKER_URL }}
      MOCKOS_STAGING_SMOKE_ORIGIN: ${{ vars.MOCKOS_STAGING_WORKER_URL }}
    steps:
      - name: Check explicit deployment opt-in
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
          MOCKOS_STAGING_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$MOCKOS_SMOKE_API_KEY"
          test -n "$MOCKOS_STAGING_SMOKE_API_KEY"
          test -n "$MOCKOS_SMOKE_ORIGIN"
          test -n "$MOCKOS_STAGING_SMOKE_ORIGIN"
          case "$MOCKOS_SMOKE_ORIGIN" in
            https://*) ;;
            *) printf 'MOCKOS_WORKER_URL must be an HTTPS origin.\n' >&2; exit 1 ;;
          esac
          case "$MOCKOS_STAGING_SMOKE_ORIGIN" in
            https://*) ;;
            *) printf 'MOCKOS_STAGING_WORKER_URL must be an HTTPS origin.\n' >&2; exit 1 ;;
          esac
      - name: Check out the CI-validated revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify pre-zone Wrangler shape
        run: node scripts/check-worker-wrangler.mjs --allow-workers-dev
      - name: Record candidate revision
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          candidate_sha=$(git rev-parse HEAD)
          printf 'sha=%s\n' "$candidate_sha" >> "$GITHUB_OUTPUT"
          printf '## Worker deployment\n\n- Candidate SHA: `%s`\n' "$candidate_sha" >> "$GITHUB_STEP_SUMMARY"
      - name: Verify Wrangler identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @mockos/worker exec wrangler whoami
      - name: Build the smoke client
        run: pnpm --filter @mockos/cli build
      - name: Deploy staging Worker
        id: deploy_staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'API_KEY=%s\n' "$MOCKOS_SMOKE_API_KEY" |
            pnpm --filter @mockos/worker exec wrangler deploy \
              --env staging --secrets-file /dev/stdin
          versions=$(pnpm --filter @mockos/worker exec wrangler versions list --env staging --json)
          version_id=$(printf '%s' "$versions" | node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const versions = JSON.parse(readFileSync(0, "utf8"));
            versions.sort((left, right) => right.number - left.number);
            if (!versions[0]?.id) throw new Error("No staging version id returned.");
            process.stdout.write(versions[0].id);
          ')
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"
          printf -- '- Staging version: `%s`\n' "$version_id" >> "$GITHUB_STEP_SUMMARY"
      - name: Run staging M3 acceptance
        env:
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
          MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_STAGING_WORKER_URL }}
        run: bash scripts/smoke-worker.sh
      - name: Deploy production Worker
        id: deploy_production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'API_KEY=%s\n' "$MOCKOS_SMOKE_API_KEY" |
            pnpm --filter @mockos/worker exec wrangler deploy \
              --env= --secrets-file /dev/stdin
          versions=$(pnpm --filter @mockos/worker exec wrangler versions list --env= --json)
          version_id=$(printf '%s' "$versions" | node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const versions = JSON.parse(readFileSync(0, "utf8"));
            versions.sort((left, right) => right.number - left.number);
            if (!versions[0]?.id) throw new Error("No production version id returned.");
            process.stdout.write(versions[0].id);
          ')
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"
          printf -- '- Production version: `%s`\n' "$version_id" >> "$GITHUB_STEP_SUMMARY"
      - name: Run production M3 acceptance
        env:
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
          MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_WORKER_URL }}
        run: bash scripts/smoke-worker.sh
