name: Deploy worker (M6 gate)

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact full commit SHA with a successful CI run
        required: true
        type: string
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.11.1
  PNPM_VERSION: 10.30.2

jobs:
  deploy:
    name: Deploy and run M6 sampled acceptance
    if: >-
      vars.MOCKOS_WORKER_DEPLOY_ENABLED == 'true' &&
      ((github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: worker-production
      url: ${{ vars.MOCKOS_WORKER_URL }}
    env:
      EXPECTED_CANDIDATE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.candidate_sha }}
      TRIGGERING_CI_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
      MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_WORKER_URL }}
      MOCKOS_STAGING_SMOKE_ORIGIN: ${{ vars.MOCKOS_STAGING_WORKER_URL }}
    steps:
      - name: Check explicit deployment opt-in
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
          MOCKOS_STAGING_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$MOCKOS_SMOKE_API_KEY"
          test -n "$MOCKOS_STAGING_SMOKE_API_KEY"
          test -n "$MOCKOS_SMOKE_ORIGIN"
          test -n "$MOCKOS_STAGING_SMOKE_ORIGIN"
          case "$MOCKOS_SMOKE_ORIGIN" in
            https://*) ;;
            *) printf 'MOCKOS_WORKER_URL must be an HTTPS origin.\n' >&2; exit 1 ;;
          esac
          case "$MOCKOS_STAGING_SMOKE_ORIGIN" in
            https://*) ;;
            *) printf 'MOCKOS_STAGING_WORKER_URL must be an HTTPS origin.\n' >&2; exit 1 ;;
          esac
      - name: Check out the CI-validated revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.EXPECTED_CANDIDATE_SHA }}
      - name: Verify exact candidate and successful CI
        id: ci_evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'candidate_sha must be a full lowercase commit SHA.\n' >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$EXPECTED_CANDIDATE_SHA"
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse refs/remotes/origin/main)" = "$EXPECTED_CANDIDATE_SHA"
          if [[ -n "$TRIGGERING_CI_RUN_ID" ]]; then
            ci_payload=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/$GITHUB_REPOSITORY/actions/runs/$TRIGGERING_CI_RUN_ID")
          else
            ci_payload=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$EXPECTED_CANDIDATE_SHA&branch=main&event=push&status=success&per_page=100")
          fi
          ci_run_id=$(printf '%s' "$ci_payload" |
            EXPECTED_CANDIDATE_SHA="$EXPECTED_CANDIDATE_SHA" node --input-type=module -e '
              import { readFileSync } from "node:fs";
              const payload = JSON.parse(readFileSync(0, "utf8"));
              const runs = Array.isArray(payload.workflow_runs)
                ? payload.workflow_runs
                : [payload];
              const matches = runs.filter(
                (run) =>
                  run.head_sha === process.env.EXPECTED_CANDIDATE_SHA &&
                  run.head_branch === "main" &&
                  run.event === "push" &&
                  run.conclusion === "success" &&
                  run.path === ".github/workflows/ci.yml"
              );
              if (!matches?.length) {
                throw new Error("No successful CI run exists for the exact candidate.");
              }
              matches.sort((left, right) => right.id - left.id);
              process.stdout.write(String(matches[0].id));
            ')
          printf 'run_id=%s\n' "$ci_run_id" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify pre-zone Wrangler shape
        run: node scripts/check-worker-wrangler.mjs --allow-workers-dev
      - name: Record candidate revision
        id: candidate
        env:
          CI_RUN_ID: ${{ steps.ci_evidence.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_sha=$(git rev-parse HEAD)
          printf 'sha=%s\n' "$candidate_sha" >> "$GITHUB_OUTPUT"
          printf '## M6 Worker deployment\n\n- Candidate SHA: `%s`\n- Successful CI run: `%s`\n' "$candidate_sha" "$CI_RUN_ID" >> "$GITHUB_STEP_SUMMARY"
      - name: Verify Wrangler identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @mockos/worker exec wrangler whoami
      - name: Build the smoke client
        run: pnpm --filter @mockos/cli build
      - name: Deploy staging Worker
        id: deploy_staging
        env:
          CANDIDATE_SHA: ${{ steps.candidate.outputs.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_tag="m6-${CANDIDATE_SHA:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-staging"
          printf 'API_KEY=%s\n' "$MOCKOS_SMOKE_API_KEY" |
            pnpm --filter @mockos/worker exec wrangler deploy \
              --env staging --secrets-file /dev/stdin \
              --tag "$deploy_tag" --message "mockOS M6 candidate $CANDIDATE_SHA"
          versions=$(pnpm --filter @mockos/worker exec wrangler versions list --env staging --json)
          version_id=$(printf '%s' "$versions" | DEPLOY_TAG="$deploy_tag" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { resolveTaggedWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            process.stdout.write(
              resolveTaggedWorkerVersion(
                JSON.parse(readFileSync(0, "utf8")),
                process.env.DEPLOY_TAG
              )
            );
          ')
          deployment=$(pnpm --filter @mockos/worker exec wrangler deployments status --env staging --json)
          printf '%s' "$deployment" | EXPECTED_VERSION_ID="$version_id" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { requireActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            requireActiveWorkerVersion(
              JSON.parse(readFileSync(0, "utf8")),
              process.env.EXPECTED_VERSION_ID
            );
          '
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$deploy_tag" >> "$GITHUB_OUTPUT"
          printf -- '- Staging version: `%s` (tag `%s`)\n' "$version_id" "$deploy_tag" >> "$GITHUB_STEP_SUMMARY"
      - name: Run staging M6 sampled acceptance
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EXPECTED_VERSION_ID: ${{ steps.deploy_staging.outputs.version_id }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_STAGING_SMOKE_API_KEY }}
          MOCKOS_EXPECTED_WORKER_VERSION_ID: ${{ steps.deploy_staging.outputs.version_id }}
          MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_STAGING_WORKER_URL }}
        shell: bash
        run: |
          set -euo pipefail
          verify_active() {
            pnpm --filter @mockos/worker exec wrangler deployments status --env staging --json |
              EXPECTED_VERSION_ID="$EXPECTED_VERSION_ID" node --input-type=module -e '
                import { readFileSync } from "node:fs";
                import { requireActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
                requireActiveWorkerVersion(
                  JSON.parse(readFileSync(0, "utf8")),
                  process.env.EXPECTED_VERSION_ID
                );
              '
          }
          verify_active
          bash scripts/smoke-worker.sh
          verify_active
      - name: Snapshot current production Worker
        id: snapshot_production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          deployment=$(pnpm --filter @mockos/worker exec wrangler deployments status --env= --json)
          version_id=$(printf '%s' "$deployment" | node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { requireSingleActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            process.stdout.write(
              requireSingleActiveWorkerVersion(JSON.parse(readFileSync(0, "utf8")))
            );
          ')
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"
          printf -- '- Pre-deploy production version: `%s`.\n' "$version_id" >> "$GITHUB_STEP_SUMMARY"
      - name: Deploy production Worker
        id: deploy_production
        env:
          CANDIDATE_SHA: ${{ steps.candidate.outputs.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_tag="m6-${CANDIDATE_SHA:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-production"
          printf 'API_KEY=%s\n' "$MOCKOS_SMOKE_API_KEY" |
            pnpm --filter @mockos/worker exec wrangler deploy \
              --env= --secrets-file /dev/stdin \
              --tag "$deploy_tag" --message "mockOS M6 candidate $CANDIDATE_SHA"
          versions=$(pnpm --filter @mockos/worker exec wrangler versions list --env= --json)
          version_id=$(printf '%s' "$versions" | DEPLOY_TAG="$deploy_tag" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { resolveTaggedWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            process.stdout.write(
              resolveTaggedWorkerVersion(
                JSON.parse(readFileSync(0, "utf8")),
                process.env.DEPLOY_TAG
              )
            );
          ')
          deployment=$(pnpm --filter @mockos/worker exec wrangler deployments status --env= --json)
          printf '%s' "$deployment" | EXPECTED_VERSION_ID="$version_id" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { requireActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            requireActiveWorkerVersion(
              JSON.parse(readFileSync(0, "utf8")),
              process.env.EXPECTED_VERSION_ID
            );
          '
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$deploy_tag" >> "$GITHUB_OUTPUT"
          printf -- '- Production version: `%s` (tag `%s`)\n' "$version_id" "$deploy_tag" >> "$GITHUB_STEP_SUMMARY"
      - name: Run production M6 sampled acceptance
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EXPECTED_VERSION_ID: ${{ steps.deploy_production.outputs.version_id }}
          MOCKOS_SMOKE_API_KEY: ${{ secrets.MOCKOS_SMOKE_API_KEY }}
          MOCKOS_EXPECTED_WORKER_VERSION_ID: ${{ steps.deploy_production.outputs.version_id }}
          MOCKOS_SMOKE_ORIGIN: ${{ vars.MOCKOS_WORKER_URL }}
        shell: bash
        run: |
          set -euo pipefail
          verify_active() {
            pnpm --filter @mockos/worker exec wrangler deployments status --env= --json |
              EXPECTED_VERSION_ID="$EXPECTED_VERSION_ID" node --input-type=module -e '
                import { readFileSync } from "node:fs";
                import { requireActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
                requireActiveWorkerVersion(
                  JSON.parse(readFileSync(0, "utf8")),
                  process.env.EXPECTED_VERSION_ID
                );
              '
          }
          verify_active
          bash scripts/smoke-worker.sh
          verify_active
      - name: Roll back failed production qualification
        if: ${{ (failure() || cancelled()) && steps.snapshot_production.outputs.version_id != '' }}
        env:
          CANDIDATE_SHA: ${{ steps.candidate.outputs.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIOUS_VERSION_ID: ${{ steps.snapshot_production.outputs.version_id }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @mockos/worker exec wrangler rollback "$PREVIOUS_VERSION_ID" \
            --env= --yes --message "Rollback failed mockOS M6 candidate $CANDIDATE_SHA"
          deployment=$(pnpm --filter @mockos/worker exec wrangler deployments status --env= --json)
          printf '%s' "$deployment" | EXPECTED_VERSION_ID="$PREVIOUS_VERSION_ID" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            import { requireActiveWorkerVersion } from "./scripts/smoke-worker-helpers.mjs";
            requireActiveWorkerVersion(
              JSON.parse(readFileSync(0, "utf8")),
              process.env.EXPECTED_VERSION_ID
            );
          '
          printf -- '- Production rollback restored version `%s` after candidate `%s` failed qualification.\n' "$PREVIOUS_VERSION_ID" "$CANDIDATE_SHA" >> "$GITHUB_STEP_SUMMARY"
      - name: Record M6 acceptance boundary
        env:
          CANDIDATE_SHA: ${{ steps.candidate.outputs.sha }}
          STAGING_VERSION_ID: ${{ steps.deploy_staging.outputs.version_id }}
          PRODUCTION_VERSION_ID: ${{ steps.deploy_production.outputs.version_id }}
        shell: bash
        run: |
          set -euo pipefail
          printf -- '- Staging and production sampled M6 acceptance passed for `%s`.\n' "$CANDIDATE_SHA" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Staging version: `%s`; production version: `%s`.\n' "$STAGING_VERSION_ID" "$PRODUCTION_VERSION_ID" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '- Scope: bounded synthetic mockOS deployment evidence; this run does not claim broad Entra ID or Okta provider parity.' >> "$GITHUB_STEP_SUMMARY"
